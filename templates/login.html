<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login | AI Resume Analyzer · ATS Smart Screening</title>
  <!-- Google Fonts & Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eef2f7 0%, #d9e3ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* static background blobs - no animation */
    .bg-blob {
      position: fixed;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(43,122,156,0.12) 0%, rgba(27,111,145,0.04) 70%);
      z-index: 0;
      pointer-events: none;
    }

    .blob-1 {
      top: -15vh;
      left: -10vw;
      width: 65vw;
      height: 65vw;
      background: radial-gradient(circle, rgba(30,105,140,0.1) 0%, rgba(30,105,140,0.02) 80%);
    }

    .blob-2 {
      bottom: -20vh;
      right: -15vw;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(40,150,114,0.08) 0%, rgba(40,150,114,0.02) 80%);
    }

    /* login card container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      margin: 2rem;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 10px;
      box-shadow: 0 30px 50px -20px rgba(0, 32, 54, 0.25), 0 0 0 1px rgba(156, 196, 214, 0.3);
      padding: 2.2rem 2rem 2.5rem;
    }

    /* header / logo */
    .logo-area {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .logo-icon i {
      font-size: 2.2rem;
      color: white;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1E3A5F, #2B6E8F);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 0.8rem;
      color: #517f9a;
      margin-top: 6px;
      font-weight: 500;
    }

    /* form styling */
    .input-group {
      margin-bottom: 1.2rem;
      position: relative;
    }

    .input-group i:not(.toggle-password) {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #8aaec2;
      font-size: 1.1rem;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px 14px 48px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid #e0edf4;
      border-radius: 10px;
      background: white;
      transition: all 0.2s;
      outline: none;
      font-weight: 500;
      color: #1f3e54;
    }

    /* special padding for password field to accommodate eye icon */
    .input-group .password-input {
      padding-right: 48px;
    }

    .input-group input:focus {
      border-color: #2B7A9C;
      box-shadow: 0 0 0 3px rgba(43, 122, 156, 0.2);
    }

    .input-group input:focus + i:not(.toggle-password) {
      color: #2B7A9C;
    }

    /* toggle password eye icon */
    .toggle-password {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #8aaec2;
      font-size: 1.1rem;
      transition: color 0.2s;
      z-index: 2;
      background: transparent;
      pointer-events: auto;
    }

    .toggle-password:hover {
      color: #2B7A9C;
    }

    /* options row */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1rem 0 1.6rem;
      font-size: 0.85rem;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #2c627e;
      font-weight: 500;
    }

    .checkbox input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #2486AE;
    }

    .forgot-link {
      color: #2486AE;
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link:hover {
      color: #145c7a;
      text-decoration: underline;
    }

    /* login button */
    .login-btn {
      background: linear-gradient(95deg, #1D5A7A, #2486AE);
      border: none;
      width: 100%;
      padding: 14px 0;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(29,90,122,0.25);
      margin-bottom: 1.8rem;
    }

    .login-btn i {
      font-size: 1rem;
    }

    .login-btn:hover {
      background: linear-gradient(95deg, #154f6b, #1b6f91);
      box-shadow: 0 12px 22px -8px rgba(27,111,145,0.4);
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1rem 0 1.4rem;
      color: #95b3c5;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #d4e2ec;
    }

    /* social login with custom brand images (PNG/SVG style) */
    .social-login {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    /* modern social button with brand-specific icon images */
    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 52px;
      background: #ffffff;
      
      transition: all 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid grey;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      overflow: hidden;
    }

    /* ensure images fit nicely inside the circular button */
    .social-icon img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
      transition: transform 0.2s;
    }

    .social-icon small {
      margin-left: 10px;
      font-size: 0.9rem;
      color: #3f6e8c;
      font-weight: 500;
    }

    .social-icon:hover {
      transform: translateY(-3px);
      background: #fafeff;
      border-color: #bdd4e2;
      box-shadow: 0 8px 18px rgba(0, 32, 54, 0.08);
    }

    .social-icon:hover img {
      transform: scale(1.02);
    }

    /* sign up link */
    .signup-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #3f6e8c;
    }

    .signup-prompt a {
      color: #1C6E8F;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid #bdd8e6;
    }

    .signup-prompt a:hover {
      color: #0b4f6c;
      border-bottom-color: #0b4f6c;
    }

    /* demo message - static info */
    .demo-message {
      background: #EFFAF5;
      border-radius: 60px;
      padding: 10px 18px;
      margin-top: 20px;
      font-size: 0.75rem;
      text-align: center;
      color: #1A6C5E;
      border-left: 3px solid #289672;
      font-weight: 500;
    }

    /* responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 1.6rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      .options-row {
        flex-wrap: wrap;
        gap: 8px;
      }
      .social-icon {
        width: 46px;
        height: 46px;
      }
      .social-icon img {
        width: 22px;
        height: 22px;
      }
    }

    /* subtle tooltip for social buttons */
    .social-icon {
      position: relative;
    }
    .social-icon:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a5f;
      color: white;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 30px;
      white-space: nowrap;
      font-weight: 500;
      pointer-events: none;
      z-index: 20;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">
          <img src="{{ url_for('static', filename='images/icon2.png') }}" 
                         alt="AI Resume Analyzer Logo" 
                         class="img-fluid" 
                         style="max-height: 100px;">
        </div>
        <h1>ResumAI<span style="font-weight:600">lytics</span></h1>
        <div class="tagline">AI-Powered ATS Scoring · RoBERTa Match · Skill Gap Detector</div>
      </div>

      <!-- login form - with eye toggle for password field -->
      <form action="{{ url_for('login') }}" method="POST">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" name="username" placeholder="Enter your email" required>
        </div>
        
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required class="password-input">
          <i class="fas fa-eye-slash toggle-password" id="togglePasswordIcon"></i>
        </div>

        <div class="options-row">
          <label class="checkbox">
            <input type="checkbox" name="remember" id="rememberCheck"> <span>Remember me</span>
          </label>
          <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
        </div>
        {% if error %}
<div style="
    background: #fee2e2;
    color: #dc2626;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
    
">
    {{ error }}
</div>
{% endif %}
        <button type="submit" class="login-btn">
          <i class="fas fa-arrow-right-to-bracket"></i> Sign In
        </button>

        

        <div class="signup-prompt">
          Don't have an account? <a href="{{ url_for('signup') }}">Create account</a>
        </div>
        
       
      </form>
    </div>
  </div>

  <!-- Simple JavaScript for toggling password visibility -->
  <script>
    (function() {
      const togglePasswordIcon = document.getElementById('togglePasswordIcon');
      const passwordInput = document.getElementById('password');
      
      if (togglePasswordIcon && passwordInput) {
        togglePasswordIcon.addEventListener('click', function(e) {
          // toggle the type attribute
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          // toggle the eye icon (slash vs open)
          if (type === 'text') {
            togglePasswordIcon.classList.remove('fa-eye-slash');
            togglePasswordIcon.classList.add('fa-eye');
          } else {
            togglePasswordIcon.classList.remove('fa-eye');
            togglePasswordIcon.classList.add('fa-eye-slash');
          }
        });
      }
    })();
  </script>
</body>

</html>
